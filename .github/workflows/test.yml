name: tests

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # `ta` (>=0.11.0) ships a legacy setup.py that fails to build against
      # setuptools>=66 ("AttributeError: install_layout"). Pin an older
      # setuptools + build `ta` without isolation so it uses that setuptools,
      # otherwise the whole install (and therefore CI) is permanently red.
      - run: pip install "setuptools<66" wheel
      - run: pip install --no-build-isolation "ta>=0.11.0"

      - run: pip install -r requirements.txt

      - run: python -m pytest -q
