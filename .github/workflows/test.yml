name: tests

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python -m pytest -q
